<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        width: 500px;
        padding: 10px;
        font-family: monospace;
      }
      .log-entry {
        border-bottom: 1px solid #ccc;
        padding: 5px;
        margin: 5px 0;
        font-size: 12px;
      }
      .request {
        background-color: #e3f2fd;
      }
      .response {
        background-color: #f3e5f5;
      }
      .timestamp {
        color: #666;
        font-size: 10px;
      }
      .url {
        color: #1976d2;
        word-break: break-all;
      }
      #logs {
        max-height: 400px;
        overflow-y: auto;
      }
      button {
        margin-bottom: 10px;
        padding: 5px 10px;
      }
      .status {
        font-weight: bold;
      }
      .status-2xx {
        color: green;
      }
      .status-3xx {
        color: orange;
      }
      .status-4xx {
        color: red;
      }
      .status-5xx {
        color: darkred;
      }
    </style>
  </head>
  <body>
    <h3>Network Request Monitor</h3>
    <button id="clearBtn">Clear Logs</button>
    <div id="logs"></div>

    <script src="popup.js"></script>
  </body>
</html>
