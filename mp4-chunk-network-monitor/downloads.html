<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Download Manager</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        width: 600px;
        min-height: 400px;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #f5f5f5;
        color: #333;
      }

      /* Header */
      .header {
        background: #fff;
        border-bottom: 1px solid #ddd;
        padding: 12px 16px;
        position: sticky;
        top: 0;
        z-index: 10;
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .header h2 {
        font-size: 16px;
        font-weight: 600;
        flex: 1;
      }

      .header-stats {
        font-size: 12px;
        color: #666;
      }

      .btn {
        padding: 6px 12px;
        border: 1px solid #ccc;
        border-radius: 4px;
        background: #fff;
        cursor: pointer;
        font-size: 12px;
        transition: all 0.2s;
      }

      .btn:hover {
        background: #f0f0f0;
      }

      .btn.danger {
        color: #d32f2f;
        border-color: #d32f2f;
      }

      .btn.danger:hover {
        background: #d32f2f;
        color: #fff;
      }

      /* Download List */
      .download-list {
        padding: 8px;
      }

      .download-item {
        background: #fff;
        border: 1px solid #e0e0e0;
        border-radius: 6px;
        margin-bottom: 8px;
        padding: 12px;
        transition: box-shadow 0.2s;
      }

      .download-item:hover {
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }

      .download-item.complete {
        border-left: 4px solid #4caf50;
      }

      .download-item.in_progress {
        border-left: 4px solid #2196f3;
      }

      .download-item.interrupted {
        border-left: 4px solid #f44336;
        opacity: 0.7;
      }

      /* Download Header Row */
      .download-header {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 8px;
      }

      .download-icon {
        width: 24px;
        height: 24px;
        flex-shrink: 0;
      }

      .download-filename {
        font-weight: 500;
        font-size: 13px;
        flex: 1;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .download-state {
        font-size: 11px;
        padding: 2px 8px;
        border-radius: 10px;
        font-weight: 500;
        flex-shrink: 0;
      }

      .state-complete {
        background: #e8f5e9;
        color: #2e7d32;
      }
      .state-progress {
        background: #e3f2fd;
        color: #1565c0;
      }
      .state-interrupted {
        background: #ffebee;
        color: #c62828;
      }
      .state-paused {
        background: #fff3e0;
        color: #e65100;
      }

      /* Progress Bar */
      .progress-container {
        margin-bottom: 8px;
      }

      .progress-bar {
        height: 6px;
        background: #e0e0e0;
        border-radius: 3px;
        overflow: hidden;
      }

      .progress-fill {
        height: 100%;
        background: linear-gradient(90deg, #4caf50, #8bc34a);
        border-radius: 3px;
        transition: width 0.3s ease;
        position: relative;
      }

      .progress-fill.active::after {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: linear-gradient(
          90deg,
          transparent 0%,
          rgba(255, 255, 255, 0.4) 50%,
          transparent 100%
        );
        animation: shimmer 1.5s infinite;
      }

      @keyframes shimmer {
        0% {
          transform: translateX(-100%);
        }
        100% {
          transform: translateX(100%);
        }
      }

      .progress-text {
        font-size: 11px;
        color: #666;
        margin-top: 4px;
        display: flex;
        justify-content: space-between;
      }

      /* Details Section */
      .download-details {
        font-size: 11px;
        color: #555;
        border-top: 1px solid #eee;
        padding-top: 8px;
        margin-top: 4px;
      }

      .detail-row {
        display: flex;
        margin-bottom: 4px;
        gap: 8px;
      }

      .detail-label {
        font-weight: 600;
        min-width: 80px;
        color: #666;
        flex-shrink: 0;
      }

      .detail-value {
        word-break: break-all;
        flex: 1;
      }

      .detail-value.path {
        font-family: "Courier New", monospace;
        background: #f9f9f9;
        padding: 2px 6px;
        border-radius: 3px;
        font-size: 10px;
        user-select: all;
      }

      .detail-value.url {
        color: #1976d2;
      }

      /* Action Buttons */
      .download-actions {
        display: flex;
        gap: 6px;
        margin-top: 8px;
        flex-wrap: wrap;
      }

      .action-btn {
        padding: 4px 10px;
        font-size: 11px;
        border: 1px solid #ddd;
        border-radius: 3px;
        background: #fff;
        cursor: pointer;
        transition: all 0.15s;
      }

      .action-btn:hover {
        background: #f5f5f5;
        border-color: #bbb;
      }

      .action-btn.open {
        color: #1565c0;
        border-color: #1565c0;
      }
      .action-btn.folder {
        color: #6a1b9a;
        border-color: #6a1b9a;
      }
      .action-btn.erase {
        color: #c62828;
        border-color: #c62828;
      }
      .action-btn.pause {
        color: #e65100;
        border-color: #e65100;
      }
      .action-btn.resume {
        color: #2e7d32;
        border-color: #2e7d32;
      }
      .action-btn.cancel {
        color: #c62828;
        border-color: #c62828;
      }

      /* Empty State */
      .empty-state {
        text-align: center;
        padding: 40px 20px;
        color: #999;
      }

      .empty-state .icon {
        font-size: 48px;
        margin-bottom: 12px;
      }

      .loading {
        text-align: center;
        padding: 20px;
        color: #666;
      }

      .loading::after {
        content: "";
        display: inline-block;
        width: 16px;
        height: 16px;
        border: 2px solid #ccc;
        border-top-color: #2196f3;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin-left: 8px;
        vertical-align: middle;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .error-state {
        text-align: center;
        padding: 20px;
        color: #c62828;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <h2>📥 Download Manager</h2>
      <span class="header-stats" id="headerStats"></span>
      <button
        class="btn danger"
        id="clearAllBtn"
        title="Clear completed downloads"
      >
        Clear All
      </button>
    </div>
    <div class="download-list" id="downloadList">
      <div class="loading">Loading downloads</div>
    </div>
    <script src="downloads.js"></script>
  </body>
</html>
