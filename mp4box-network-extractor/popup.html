<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>MP4Box Extractor</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <h1>📹 MP4Box Network Extractor</h1>
        <div class="status">
          <span class="status-indicator" id="statusIndicator"></span>
          <span id="statusText">Monitoring...</span>
        </div>
        <button id="refreshBtn" class="btn-refresh">🔄 Refresh</button>
      </header>

      <div class="stats" id="stats">
        <div class="stat-card">
          <div class="stat-value" id="detectedCount">0</div>
          <div class="stat-label">MP4s Detected</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="parsedCount">0</div>
          <div class="stat-label">Parsed</div>
        </div>
      </div>

      <div class="filters">
        <input
          type="text"
          id="searchInput"
          placeholder="Filter by URL..."
          class="search-input"
        />
        <select id="statusFilter" class="status-filter">
          <option value="all">All Status</option>
          <option value="detected">Detected</option>
          <option value="headers_received">Headers Received</option>
          <option value="completed">Completed</option>
          <option value="parsed">Parsed</option>
          <option value="error">Error</option>
        </select>
      </div>

      <div class="mp4-list" id="mp4List">
        <div class="loading">Loading detected MP4 files...</div>
      </div>

      <div class="logs" id="logs">
        <div class="logs-header">
          <h3>Activity Logs</h3>
          <button id="clearLogsBtn" class="btn-clear">Clear</button>
        </div>
        <div class="logs-content" id="logsContent">
          <div class="log-entry">
            Extension started - Monitoring MP4 network requests...
          </div>
        </div>
      </div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
